name: Deploy GitHub Pages

on:
  workflow_dispatch:
    inputs:
      target:
        description: Deployment target
        required: true
        default: project
        type: choice
        options:
          - project
          - portfolio
      portfolio_repository:
        description: External repo for portfolio deployment
        required: false
        default: ArnabBir/arnabbir.github.io
        type: string
      portfolio_branch:
        description: Branch for portfolio deployment
        required: false
        default: main
        type: string

permissions:
  contents: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install MkDocs
        run: |
          python -m pip install --upgrade pip
          pip install mkdocs mkdocs-material pymdown-extensions

      - name: Prepare MkDocs config for target
        env:
          DEPLOY_TARGET: ${{ inputs.target }}
        run: |
          python - <<'PY'
          import os
          import re

          with open("mkdocs.yml", "r", encoding="utf-8") as f:
              config_text = f.read()

          target = os.environ["DEPLOY_TARGET"]
          if target == "portfolio":
              site_url = "https://arnabbir.github.io/"
          else:
              site_url = "https://arnabbir.github.io/ai-engineering-explained/"

          config_text = re.sub(
              r"^site_url:\s*.*$",
              f"site_url: {site_url}",
              config_text,
              count=1,
              flags=re.MULTILINE,
          )

          with open("mkdocs.deploy.yml", "w", encoding="utf-8") as f:
              f.write(config_text)
          PY

      - name: Build site
        run: mkdocs build --strict -f mkdocs.deploy.yml

      - name: Deploy to project branch
        if: ${{ inputs.target == 'project' }}
        uses: peaceiris/actions-gh-pages@v4
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_branch: gh-pages
          publish_dir: ./site
          force_orphan: true

      - name: Deploy to portfolio repository
        if: ${{ inputs.target == 'portfolio' }}
        uses: peaceiris/actions-gh-pages@v4
        with:
          personal_token: ${{ secrets.PAGES_DEPLOY_TOKEN }}
          external_repository: ${{ inputs.portfolio_repository }}
          publish_branch: ${{ inputs.portfolio_branch }}
          publish_dir: ./site
          force_orphan: true
